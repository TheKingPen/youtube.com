<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .header {
            padding: 13px 10px 13px 10px;
            height: 55px;
            background-color: rgb(102, 36, 164);
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 550;
            width: 150px;
        }
        .header-middle {
            flex: 1;
            margin-left: 40px;
            margin-right: 40px;
        }
        input {
            flex: 1;
            height: 36px;
            min-width: 0;
            font-size: 16px;
            border: 1px solid  rgb(192, 192, 192);
            border-radius: 50px;
            box-shadow: inset 1px 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .header-right {
            width: 180px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 1;
         }
        button {
            background: none;
            color: white;
            border: 1.5px solid #e0e0e0;
            padding: 10px 15px 10px 15px;
            border-radius: 3px;
            display: flex;
            flex-shrink: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">Home</div>
        <div class="header-middle">
            <input type="text" placeholder="Search">
        </div>
        <div class="header-right">
            <button>Download</button>
        </div>
    </div>
</body>
</html>
